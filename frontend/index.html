<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/jarvis.css">
</head>
<body>
    <!-- Scan line overlay -->
    <div class="scanline"></div>

    <!-- Main grid -->
    <div class="hud-container">

        <!-- Top bar -->
        <header class="top-bar">
            <div class="logo">
                <span class="logo-icon">&#9678;</span>
                <span class="logo-text">J.A.R.V.I.S.</span>
                <span class="logo-sub">Operating System v1.0</span>
            </div>
            <div class="top-right">
                <!-- Voice mode indicator -->
                <button class="top-btn" id="mode-btn" title="Switch to continuous mode">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                    <span id="mode-indicator">PTT</span>
                </button>
                <!-- Mute toggle -->
                <button class="top-btn" id="mute-btn" title="Mute voice output">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" class="speaker-icon">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" class="muted-icon" style="display:none;">
                        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                    </svg>
                </button>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span id="connection-status">CONNECTING</span>
                </div>
                <div id="clock" class="clock"></div>
                <div id="date-display" class="date-display"></div>
            </div>
        </header>

        <!-- Main content grid -->
        <div class="main-grid">

            <!-- Left panel: System gauges -->
            <aside class="left-panel">
                <div class="panel-header">SYSTEM MONITOR</div>

                <div class="gauge-container">
                    <canvas id="cpu-gauge" width="160" height="160"></canvas>
                    <div class="gauge-label">CPU</div>
                    <div class="gauge-value" id="cpu-value">0%</div>
                </div>

                <div class="gauge-container">
                    <canvas id="ram-gauge" width="160" height="160"></canvas>
                    <div class="gauge-label">RAM</div>
                    <div class="gauge-value" id="ram-value">0%</div>
                </div>

                <div class="gauge-container">
                    <canvas id="disk-gauge" width="160" height="160"></canvas>
                    <div class="gauge-label">DISK</div>
                    <div class="gauge-value" id="disk-value">0%</div>
                </div>

                <div class="battery-bar" id="battery-section">
                    <div class="panel-header" style="margin-top: 10px;">POWER</div>
                    <div class="battery-container">
                        <div class="battery-fill" id="battery-fill"></div>
                    </div>
                    <div class="battery-text" id="battery-text">---%</div>
                </div>
            </aside>

            <!-- Center: Visualizer + Chat -->
            <main class="chat-panel">
                <div class="panel-header">
                    NEURAL INTERFACE
                    <span class="typing-indicator" id="typing-indicator">
                        <span></span><span></span><span></span>
                    </span>
                </div>

                <!-- Voice Visualizer -->
                <div class="visualizer-container" id="visualizer-container">
                    <canvas id="visualizer-canvas"></canvas>
                    <div class="visualizer-label" id="visualizer-label">IDLE</div>
                </div>

                <div class="chat-messages" id="chat-messages"></div>

                <div class="chat-input-area">
                    <button class="mic-btn" id="mic-btn" title="Hold to talk (or press Space)">
                        <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </button>
                    <input type="text" id="chat-input" placeholder="Hold SPACE to talk, or type here..." autocomplete="off">
                    <button class="send-btn" id="send-btn" title="Send">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </main>

            <!-- Right panel: Info -->
            <aside class="right-panel">
                <div class="panel-header">SYSTEM INFO</div>
                <div class="info-grid" id="system-info">
                    <div class="info-item">
                        <span class="info-label">OS</span>
                        <span class="info-value" id="info-os">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">HOST</span>
                        <span class="info-value" id="info-host">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">USER</span>
                        <span class="info-value" id="info-user">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">UPTIME</span>
                        <span class="info-value" id="info-uptime">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">IP</span>
                        <span class="info-value" id="info-ip">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">RAM</span>
                        <span class="info-value" id="info-ram">---</span>
                    </div>
                </div>

                <div class="panel-header" style="margin-top: 20px;">QUICK ACTIONS</div>
                <div class="quick-actions">
                    <button class="action-btn" onclick="sendQuickCommand('open chrome')">Chrome</button>
                    <button class="action-btn" onclick="sendQuickCommand('open vscode')">VS Code</button>
                    <button class="action-btn" onclick="sendQuickCommand('open terminal')">Terminal</button>
                    <button class="action-btn" onclick="sendQuickCommand('open spotify')">Spotify</button>
                    <button class="action-btn" onclick="sendQuickCommand('open explorer')">Files</button>
                    <button class="action-btn" onclick="sendQuickCommand('what are my system stats?')">Stats</button>
                </div>

                <div class="panel-header" style="margin-top: 20px;">ACTIVITY LOG</div>
                <div class="activity-log" id="activity-log"></div>
            </aside>

        </div>

        <!-- Bottom bar -->
        <footer class="bottom-bar">
            <span class="footer-text">J.A.R.V.I.S. OS &mdash; Just A Rather Very Intelligent System</span>
            <span class="footer-model" id="footer-model">MODEL: CLAUDE SONNET</span>
        </footer>

    </div>

    <script src="/js/dashboard.js"></script>
    <script src="/js/visualizer.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/voice.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
